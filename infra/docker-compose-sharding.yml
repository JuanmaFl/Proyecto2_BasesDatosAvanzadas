version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: pg_banco
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: banco_db
    ports:
      - "5432:5432"
    # max_prepared_transactions es VITAL para permitir 2PC
    command: postgres -c max_prepared_transactions=100 -c listen_addresses='*'